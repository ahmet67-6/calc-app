name: Build Flet APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install flet

      - name: Build APK
        env:
          FLET_NO_INPUT: "true"
        run: |
          cd calcapp
          yes | flet build apk --skip-flutter-check
          echo "== APK dosyaları =="
          find . -name "*.apk"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: hesap-makinesi-apk
          path: calcapp/build/apk/*.apk
          if-no-files-found: error
