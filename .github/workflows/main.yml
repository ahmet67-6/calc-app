name: Build Flet APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      # 1. Adım: Flutter'ı manuel olarak kur (Soru sormaz)
      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          
      # 2. Adım: Flet ve build araçlarını kur
      - name: Install Dependencies
        run: |
          pip install flet
          
      # 3. Adım: APK Derle
      - name: Build APK
        run: |
          cd calcapp
          flet build apk
        env:
          # Flet'in soru sormaması için en güçlü yöntem
          FLET_NO_INPUT: "true"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: hesap-makinesi-apk
          path: calcapp/build/apk/app-release.apk
          
